<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>J&K Kreations | Custom Canvas Prints</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Snipcart -->
  <link rel="stylesheet" href="https://cdn.snipcart.com/themes/v3.3.0/default/snipcart.css" />
  <script>
    window.SnipcartSettings = {
      publicApiKey: 'MjJhYTkxMDAtMzZkYi00YzYwLWJkYWQtZWQwYzM0Mjg1OWFhNjM5MTMwMjI5Njg5ODQ3MTQ3',
      loadStrategy: 'on-user-interaction',
    };
  </script>
  <script src="https://cdn.snipcart.com/themes/v3.3.0/default/snipcart.js"></script>
</head>
<body class="bg-zinc-950 text-white">

  <!-- Navigation (same as before) -->
  <nav class="bg-black p-4 sticky top-0 z-50 border-b border-zinc-800">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
      <h1 class="text-3xl font-bold text-orange-500">J&K Kreations</h1>
      <div class="space-x-8 text-lg">
        <a href="#catalog" class="hover:text-orange-400">Catalog</a>
        <a href="#design" class="hover:text-orange-400">Design Your Own</a>
        <a href="#quote" class="hover:text-orange-400">Large Custom</a>
      </div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-6 py-12">

    <!-- Design Your Own Section -->
    <section id="design" class="mb-20 bg-zinc-900 rounded-3xl p-10">
      <h2 class="text-4xl font-bold mb-8">Design Your Own Canvas</h2>
      <div class="grid md:grid-cols-2 gap-12">
        <div>
          <input type="file" id="imageUpload" accept="image/*" class="block w-full text-sm text-zinc-400 file:mr-4 file:py-3 file:px-6 file:rounded-xl file:border-0 file:bg-orange-500 file:text-white">

          <div id="preview" class="hidden mt-6 border-2 border-dashed border-zinc-700 rounded-3xl p-6"></div>
          
          <div id="analysis" class="hidden mt-8"></div>
          
          <button onclick="uploadAndUpscale()" id="upscaleBtn"
                  class="hidden mt-8 w-full bg-emerald-600 hover:bg-emerald-500 py-5 rounded-3xl font-semibold text-lg">
            ✨ Enhance with AI Upscale (+$8)
          </button>

          <!-- New: Add to Cart button after upscale -->
          <button onclick="addUpscaledToCart()" id="addToCartBtn"
                  class="hidden mt-4 w-full bg-orange-500 hover:bg-orange-600 py-5 rounded-3xl font-semibold text-lg">
            🛒 Add Upscaled Canvas to Cart
          </button>
        </div>

        <div id="result" class="hidden">
          <h3 class="font-semibold text-xl mb-4">Before & After</h3>
          <div class="grid grid-cols-2 gap-4" id="beforeAfter"></div>
        </div>
      </div>
    </section>

  </main>

  <script>
    const CLOUD_NAME = "domnywtiz";
    const UPLOAD_PRESET = "canvas_uploads";
    let upscaledImageUrl = "";

    // ... (analyzeImage function stays the same) ...
    function analyzeImage(file) {
      const img = new Image();
      img.onload = function() {
        const width = img.width;
        const height = img.height;

        let html = `<h4 class="font-semibold text-xl mb-4">📊 Quality Analysis</h4>`;

        const sizes = [
          {name: "16×20\"", w: 2400, h: 3000},
          {name: "24×36\"", w: 3600, h: 5400}
        ];

        sizes.forEach(size => {
          const quality = (width >= size.w && height >= size.h) ? "✅ Excellent" : 
                         (width >= size.w * 0.65) ? "⚠️ Good but upscalable" : "❌ Too Low";
          html += `<div class="bg-zinc-800 p-5 rounded-2xl mb-4"><strong>${size.name}</strong><br><span class="text-sm">${quality}</span></div>`;
        });

        document.getElementById("analysis").classList.remove("hidden");
        document.getElementById("analysis").innerHTML = html;

        if (width < 3000) document.getElementById("upscaleBtn").classList.remove("hidden");
      };
      img.src = URL.createObjectURL(file);
    }

    document.getElementById("imageUpload").addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const preview = document.getElementById("preview");
      preview.classList.remove("hidden");
      preview.innerHTML = `<img src="${URL.createObjectURL(file)}" class="max-h-96 mx-auto rounded-2xl">`;

      analyzeImage(file);
    });

    async function uploadAndUpscale() {
      const file = document.getElementById("imageUpload").files[0];
      if (!file) return alert("Please upload an image first");

      const formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", UPLOAD_PRESET);

      try {
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
          method: "POST",
          body: formData
        });
        const data = await res.json();
        
        upscaledImageUrl = data.secure_url.replace("/upload/", "/upload/e_upscale/");

        // Show before & after
        const resultDiv = document.getElementById("result");
        resultDiv.classList.remove("hidden");
        resultDiv.querySelector("#beforeAfter").innerHTML = `
          <div><p class="text-center mb-2">Original</p><img src="${data.secure_url}" class="rounded-2xl"></div>
          <div><p class="text-center mb-2">AI Upscaled</p><img src="${upscaledImageUrl}" class="rounded-2xl"></div>
        `;

        document.getElementById("upscaleBtn").classList.add("hidden");
        document.getElementById("addToCartBtn").classList.remove("hidden");

        alert("✅ Image successfully upscaled!\n\nReview the before/after and click 'Add to Cart' below.");
      } catch (err) {
        alert("Upload failed. Please try again.");
      }
    }

    function addUpscaledToCart() {
      if (!upscaledImageUrl) return alert("Please upscale an image first");

      Snipcart.api.cart.items.add({
        id: "custom-upscaled-canvas-" + Date.now(),
        name: "Custom AI-Upscaled Canvas Print",
        price: 89,
        url: window.location.href,
        description: "Customer uploaded & AI enhanced image - Ready to print",
        image: upscaledImageUrl,
        customFields: [
          { name: "Image URL", value: upscaledImageUrl }
        ]
      }).then(() => {
        alert("✅ Added to cart! You can now checkout.");
      });
    }
  </script>
</body>
</html>
